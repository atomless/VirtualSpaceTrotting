<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="VirtualSpaceTrotting is an atlas of fictional generated satellite-style locations."
    />
    <script src="/mpulse-config.js"></script>
    <script>
      var profile = window.VST_MPULSE_PROFILE;
      var validProfile =
        profile &&
        typeof profile.apiKey === "string" &&
        /^[A-Za-z0-9]{5}(?:-[A-Za-z0-9]{5}){4}$/.test(profile.apiKey) &&
        typeof profile.scriptBaseUrl === "string" &&
        /^https:\/\/[^?#]+\/boomerang\/$/.test(profile.scriptBaseUrl);

      window.BOOMR_live = 1;
      window.BOOMR_config = {
        Errors: { monitorReporting: true, monitorRejections: true },
        LOGN: { storeConfig: true },
        Continuity: { afterOnload: true, afterOnloadMaxLength: false }
      };
      window.BOOMR = window.BOOMR || {};
      window.BOOMR_API_key = validProfile ? profile.apiKey : "";
    </script>
    <script>
      (function captureEarlyBoomerangEvents() {
        if (!window.BOOMR_API_key) return;

        var inputEvents = ["click", "mousedown", "keydown", "touchstart", "pointerdown"];
        var state = { errors: [], firstInput: null };
        window.BOOMR_EARLY_STATE = state;

        function dispatchFirstInput() {
          var event;
          if (typeof CustomEvent === "function") {
            event = new CustomEvent("vst:boomerang-first-input", { detail: state.firstInput });
          } else {
            event = document.createEvent("CustomEvent");
            event.initCustomEvent("vst:boomerang-first-input", false, false, state.firstInput);
          }
          window.dispatchEvent(event);
        }

        function stopInputCapture() {
          for (var index = 0; index < inputEvents.length; index += 1) {
            window.removeEventListener(inputEvents[index], captureFirstInput, true);
          }
        }

        function captureFirstInput(event) {
          if (state.firstInput) return;
          var now = window.performance && window.performance.now
            ? window.performance.now()
            : new Date().getTime();
          state.firstInput = {
            delay: Math.max(0, Math.ceil(now - event.timeStamp)),
            timeStamp: event.timeStamp,
            type: event.type
          };
          stopInputCapture();
          dispatchFirstInput();
        }

        function captureError(event) {
          if (state.errors.length >= 10) return;
          state.errors.push({ message: String(event.error || event.message), source: "window.error" });
        }

        function captureRejection(event) {
          if (state.errors.length >= 10) return;
          state.errors.push({ message: String(event.reason), source: "unhandledrejection" });
        }

        for (var index = 0; index < inputEvents.length; index += 1) {
          window.addEventListener(inputEvents[index], captureFirstInput, { capture: true, passive: true });
        }
        window.addEventListener("error", captureError);
        window.addEventListener("unhandledrejection", captureRejection);

        state.stopErrorCapture = function stopErrorCapture() {
          window.removeEventListener("error", captureError);
          window.removeEventListener("unhandledrejection", captureRejection);
        };
      })();
    </script>
    <script>
      (function initBoomerang() {
        var profile = window.VST_MPULSE_PROFILE;
        if (!window.BOOMR_API_key || !profile) return;

        if (window.BOOMR && (window.BOOMR.version || window.BOOMR.snippetExecuted)) {
          return;
        }

        window.BOOMR = window.BOOMR || {};
        window.BOOMR.snippetStart = new Date().getTime();
        window.BOOMR.snippetExecuted = true;
        window.BOOMR.snippetVersion = 14;
        window.BOOMR.url = profile.scriptBaseUrl + profile.apiKey;

        var where = document.currentScript || document.getElementsByTagName("script")[0];
        var parentNode = where.parentNode;
        var promoted = false;
        var loaderTimeout = 3000;

        function notifyBoomerangReady() {
          var event;
          if (typeof Event === "function") {
            event = new Event("vst:boomerang-ready");
          } else {
            event = document.createEvent("Event");
            event.initEvent("vst:boomerang-ready", false, false);
          }
          window.dispatchEvent(event);
        }

        function promote() {
          if (promoted) return;

          var script = document.createElement("script");
          script.id = "boomr-scr-as";
          script.src = window.BOOMR.url;
          script.async = true;
          script.addEventListener("load", notifyBoomerangReady);
          parentNode.appendChild(script);
          promoted = true;
        }

        function iframeLoader(wasFallback) {
          promoted = true;

          var domain;
          var doc = document;
          var win = window;

          window.BOOMR.snippetMethod = wasFallback ? "if" : "i";

          function bootstrap(parent, scriptId) {
            var script = doc.createElement("script");
            script.id = scriptId || "boomr-if-as";
            script.src = window.BOOMR.url;
            script.addEventListener("load", notifyBoomerangReady);
            BOOMR_lstart = new Date().getTime();
            (parent || doc.body).appendChild(script);
          }

          if (!window.addEventListener && window.attachEvent && navigator.userAgent.match(/MSIE [67]\./)) {
            window.BOOMR.snippetMethod = "s";
            bootstrap(parentNode, "boomr-async");
            return;
          }

          var iframe = document.createElement("iframe");
          iframe.src = "about:blank";
          iframe.title = "";
          iframe.role = "presentation";
          iframe.loading = "eager";

          var iframeStyle = (iframe.frameElement || iframe).style;
          iframeStyle.width = 0;
          iframeStyle.height = 0;
          iframeStyle.border = 0;
          iframeStyle.display = "none";
          parentNode.appendChild(iframe);

          try {
            win = iframe.contentWindow;
            doc = win.document.open();
          } catch (error) {
            domain = document.domain;
            iframe.src = "javascript:var d=document.open();d.domain='" + domain + "';void 0;";
            win = iframe.contentWindow;
            doc = win.document.open();
          }

          if (domain) {
            doc._boomrl = function loadBoomerangForDomain() {
              this.domain = domain;
              bootstrap();
            };
            doc.write("<bo" + "dy onload='document._boomrl();'>");
          } else {
            win._boomrl = function loadBoomerang() {
              bootstrap();
            };
            if (win.addEventListener) {
              win.addEventListener("load", win._boomrl, false);
            } else if (win.attachEvent) {
              win.attachEvent("onload", win._boomrl);
            }
          }
          doc.close();
        }

        var link = document.createElement("link");
        if (
          link.relList &&
          typeof link.relList.supports === "function" &&
          link.relList.supports("preload") &&
          "as" in link
        ) {
          window.BOOMR.snippetMethod = "p";
          link.href = window.BOOMR.url;
          link.rel = "preload";
          link.as = "script";
          link.addEventListener("load", promote);
          link.addEventListener("error", function loadWithIframeFallback() {
            iframeLoader(true);
          });
          setTimeout(function loadAfterTimeout() {
            if (!promoted) iframeLoader(true);
          }, loaderTimeout);
          BOOMR_lstart = new Date().getTime();
          parentNode.appendChild(link);
        } else {
          iframeLoader(false);
        }

        function saveLoadTime(event) {
          window.BOOMR_onload = (event && event.timeStamp) || new Date().getTime();
        }

        if (window.addEventListener) {
          window.addEventListener("load", saveLoadTime, false);
        } else if (window.attachEvent) {
          window.attachEvent("onload", saveLoadTime);
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div>%sveltekit.body%</div>
  </body>
</html>
